name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Install WebView2
        # WebView2 is pre-installed on windows-latest but this ensures it's available
        shell: pwsh
        run: |
          $webview2 = Get-ItemProperty "HKLM:\SOFTWARE\WOW6432Node\Microsoft\EdgeUpdate\Clients\{F3017226-FE2A-4295-8BDF-00C3A9A7E4C5}" -ErrorAction SilentlyContinue
          if ($null -eq $webview2) {
            Write-Host "Installing WebView2..."
            Invoke-WebRequest -Uri "https://go.microsoft.com/fwlink/p/?LinkId=2124703" -OutFile "$env:TEMP\MicrosoftEdgeWebview2Setup.exe"
            Start-Process -FilePath "$env:TEMP\MicrosoftEdgeWebview2Setup.exe" -Args "/silent /install" -Wait
          } else {
            Write-Host "WebView2 already installed: $($webview2.pv)"
          }

      - name: Install cargo-binstall
        uses: cargo-bins/cargo-binstall@main

      - name: Install Tauri CLI
        run: cargo binstall tauri-cli --version "^2" --locked -y

      - name: Build release bundle
        run: cargo tauri build
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: zeclip-windows
          path: target/release/zeclip.exe

  release:
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Download the built artifact
        uses: actions/download-artifact@v4
        with:
          name: zeclip-windows
          path: .

      - name: Upload to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: zeclip.exe
          generate_release_notes: true
