<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Zeclip</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #1e1e1e;
      color: #d4d4d4;
      font-family: 'Cascadia Code', 'Fira Code', 'Consolas', monospace;
      font-size: 13px;
      display: flex;
      flex-direction: column;
      height: 100vh;
      overflow: hidden;
    }

    header {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 10px 16px;
      background: #252526;
      border-bottom: 1px solid #3e3e42;
      flex-shrink: 0;
    }

    h1 {
      font-size: 13px;
      font-weight: 600;
      color: #cccccc;
      flex: 1;
      letter-spacing: 0.02em;
    }

    #status {
      font-size: 11px;
      color: #858585;
      min-width: 80px;
      text-align: right;
    }

    button {
      background: #0e639c;
      color: #ffffff;
      border: none;
      padding: 5px 14px;
      border-radius: 3px;
      cursor: pointer;
      font-size: 12px;
      font-family: inherit;
      white-space: nowrap;
    }
    button:hover { background: #1177bb; }
    button:active { background: #0d5189; }

    #output-wrap {
      flex: 1;
      overflow: auto;
      padding: 16px;
    }

    pre {
      white-space: pre-wrap;
      word-break: break-word;
      line-height: 1.6;
      color: #d4d4d4;
    }
    pre.error { color: #f14c4c; }
    pre.empty { color: #6a6a6a; font-style: italic; }
    pre.loading { color: #6a6a6a; }
  </style>
</head>
<body>
  <header>
    <h1>Zeclip — Clipboard Viewer</h1>
    <span id="status"></span>
    <button id="btn">Read Clipboard (F5)</button>
  </header>
  <div id="output-wrap">
    <pre id="output" class="loading">Reading clipboard…</pre>
  </div>

  <script>
    const { invoke } = window.__TAURI__.core;
    const output = document.getElementById('output');
    const status = document.getElementById('status');

    async function readClipboard() {
      output.className = 'loading';
      output.textContent = 'Reading clipboard…';
      status.textContent = '';

      try {
        const text = await invoke('read_clipboard');
        output.textContent = text;
        output.className = text.includes('[clipboard is empty]') ? 'empty' : '';
        status.textContent = new Date().toLocaleTimeString();
      } catch (e) {
        output.textContent = String(e);
        output.className = 'error';
        status.textContent = 'error';
      }
    }

    document.getElementById('btn').addEventListener('click', readClipboard);

    document.addEventListener('keydown', e => {
      if (e.key === 'F5' || (e.ctrlKey && e.key === 'r')) {
        e.preventDefault();
        readClipboard();
      }
    });

    readClipboard();
  </script>
</body>
</html>
