<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Zeclip</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #1e1e1e;
      color: #d4d4d4;
      font-family: 'Cascadia Code', 'Fira Code', 'Consolas', monospace;
      font-size: 13px;
      display: flex;
      flex-direction: column;
      height: 100vh;
      overflow: hidden;
    }

    header {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 10px 16px;
      background: #252526;
      border-bottom: 1px solid #3e3e42;
      flex-shrink: 0;
    }

    h1 {
      font-size: 13px;
      font-weight: 600;
      color: #cccccc;
      flex: 1;
      letter-spacing: 0.02em;
    }

    #status {
      font-size: 11px;
      color: #858585;
      min-width: 80px;
      text-align: right;
    }

    button {
      background: #0e639c;
      color: #ffffff;
      border: none;
      padding: 5px 14px;
      border-radius: 3px;
      cursor: pointer;
      font-size: 12px;
      font-family: inherit;
      white-space: nowrap;
    }
    button:hover { background: #1177bb; }
    button:active { background: #0d5189; }

    /* ── Two-panel layout ── */
    #layout {
      flex: 1;
      display: flex;
      overflow: hidden;
    }

    /* ── Sidebar ── */
    #sidebar {
      width: 220px;
      flex-shrink: 0;
      background: #252526;
      border-right: 1px solid #3e3e42;
      overflow-y: auto;
      display: flex;
      flex-direction: column;
    }

    #sidebar-empty {
      color: #6a6a6a;
      font-style: italic;
      padding: 16px 12px;
      font-size: 11px;
    }

    .nav-item {
      padding: 8px 12px;
      cursor: pointer;
      border-bottom: 1px solid #2d2d30;
      user-select: none;
      transition: background 0.1s;
    }
    .nav-item:hover { background: #2a2d2e; }
    .nav-item.active { background: #094771; border-left: 2px solid #0e639c; padding-left: 10px; }

    .nav-item .nav-label {
      font-size: 12px;
      font-weight: 500;
      color: #cccccc;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .nav-item.preview .nav-label { color: #858585; }

    .nav-item .nav-meta {
      font-size: 10px;
      color: #6a6a6a;
      margin-top: 2px;
      display: flex;
      gap: 6px;
      align-items: center;
    }

    .badge {
      padding: 1px 5px;
      border-radius: 3px;
      font-size: 9px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.04em;
    }
    .badge-text    { background: #1e3a5f; color: #75beff; }
    .badge-xml     { background: #3a2d1e; color: #ce9178; }
    .badge-binary  { background: #2a2a2a; color: #858585; }
    .badge-preview { background: #2a1e3a; color: #9e7ec8; }

    /* ── Content panel ── */
    #content-panel {
      flex: 1;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    #content-header {
      padding: 6px 16px;
      background: #2d2d30;
      border-bottom: 1px solid #3e3e42;
      font-size: 11px;
      color: #858585;
      flex-shrink: 0;
      display: flex;
      align-items: center;
      gap: 10px;
    }

    #content-header-label {
      flex: 1;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    #toggle-btn {
      background: #3a3d41;
      color: #cccccc;
      border: 1px solid #555;
      padding: 2px 10px;
      border-radius: 3px;
      cursor: pointer;
      font-size: 11px;
      font-family: inherit;
      white-space: nowrap;
      flex-shrink: 0;
    }
    #toggle-btn:hover { background: #4a4d51; }

    #output-wrap {
      flex: 1;
      overflow: auto;
      padding: 16px;
    }

    #output-img {
      max-width: 100%;
      max-height: 100%;
      display: block;
      image-rendering: pixelated;
    }

    pre {
      white-space: pre-wrap;
      word-break: break-word;
      line-height: 1.6;
      color: #d4d4d4;
    }
    pre.error   { color: #f14c4c; }
    pre.empty   { color: #6a6a6a; font-style: italic; }
    pre.loading { color: #6a6a6a; }
    pre.xml     { color: #ce9178; }
  </style>
</head>
<body>
  <header>
    <h1>Zeclip — Clipboard Viewer</h1>
    <span id="status"></span>
    <button id="btn">Read Clipboard (F5)</button>
  </header>

  <div id="layout">
    <nav id="sidebar">
      <div id="sidebar-empty">No data</div>
    </nav>
    <div id="content-panel">
      <div id="content-header">
        <span id="content-header-label">Select a format on the left</span>
        <button id="toggle-btn" style="display:none">Show Binary</button>
      </div>
      <div id="output-wrap">
        <pre id="output" class="loading">Reading clipboard…</pre>
        <img id="output-img" style="display:none" alt="clipboard image" />
      </div>
    </div>
  </div>

  <script>
    const { invoke } = window.__TAURI__.core;
    const output            = document.getElementById('output');
    const outputImg         = document.getElementById('output-img');
    const status            = document.getElementById('status');
    const sidebar           = document.getElementById('sidebar');
    const sidebarEmpty      = document.getElementById('sidebar-empty');
    const contentHeaderLabel = document.getElementById('content-header-label');
    const toggleBtn         = document.getElementById('toggle-btn');

    let blocks = [];
    let selectedIndex = -1;
    let showingBinary = false;

    function kindBadge(kind, isPreview) {
      if (isPreview) return '<span class="badge badge-preview">preview</span>';
      if (kind === 'xml')    return '<span class="badge badge-xml">XML</span>';
      if (kind === 'binary') return '<span class="badge badge-binary">binary</span>';
      return '<span class="badge badge-text">text</span>';
    }

    function renderContent() {
      const block = blocks[selectedIndex];
      if (!block) return;

      const isImage = block.contentKind === 'image' && !showingBinary;
      const isBinaryKind = block.contentKind === 'binary';

      if (isImage) {
        output.style.display = 'none';
        outputImg.style.display = 'block';
        outputImg.src = block.imageDataUrl;
      } else {
        outputImg.style.display = 'none';
        output.style.display = '';
        const text = (isBinaryKind || showingBinary) ? block.hexDump : block.formattedText;
        if (!text || text.trim() === '') {
          output.textContent = '(empty)';
          output.className = 'empty';
        } else {
          output.textContent = text;
          output.className = (!isBinaryKind && !showingBinary && block.contentKind === 'xml') ? 'xml' : '';
        }
      }
    }

    function selectBlock(index) {
      selectedIndex = index;
      showingBinary = false;

      // Update sidebar active state
      sidebar.querySelectorAll('.nav-item').forEach((el, i) => {
        el.classList.toggle('active', i === index);
      });

      const block = blocks[index];
      if (!block) return;

      // Update content header
      const previewTag = block.isPreview ? '  [preview/duplicate]' : '';
      contentHeaderLabel.textContent =
        `format #${block.formatId} : ${block.formatName}${previewTag}`;

      // Show toggle for anything that has an alternative binary view
      const canToggle = block.contentKind !== 'binary';
      toggleBtn.style.display = canToggle ? '' : 'none';
      toggleBtn.textContent = 'Show Binary';

      renderContent();
    }

    function buildSidebar() {
      sidebar.innerHTML = '';

      if (blocks.length === 0) {
        sidebar.appendChild(sidebarEmpty);
        sidebarEmpty.textContent = 'Clipboard is empty';
        return;
      }

      blocks.forEach((block, i) => {
        const item = document.createElement('div');
        item.className = 'nav-item' + (block.isPreview ? ' preview' : '');
        item.innerHTML =
          `<div class="nav-label">${escHtml(block.label)}</div>` +
          `<div class="nav-meta">` +
            `<span>#${block.formatId}</span>` +
            kindBadge(block.contentKind, block.isPreview) +
          `</div>`;
        item.addEventListener('click', () => selectBlock(i));
        sidebar.appendChild(item);
      });
    }

    function escHtml(s) {
      return s.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
    }

    async function readClipboard() {
      output.className = 'loading';
      output.textContent = 'Reading clipboard…';
      contentHeaderLabel.textContent = 'Reading…';
      toggleBtn.style.display = 'none';
      status.textContent = '';
      blocks = [];
      selectedIndex = -1;
      sidebar.innerHTML = '';

      try {
        const result = await invoke('read_clipboard');
        blocks = result;
        buildSidebar();
        status.textContent = new Date().toLocaleTimeString();

        if (blocks.length === 0) {
          output.textContent = '[clipboard is empty]';
          output.className = 'empty';
          contentHeaderLabel.textContent = 'No formats found';
        } else {
          // Auto-select the first non-preview block, or first block overall
          const firstMain = blocks.findIndex(b => !b.isPreview);
          selectBlock(firstMain >= 0 ? firstMain : 0);
        }
      } catch (e) {
        output.textContent = String(e);
        output.className = 'error';
        contentHeaderLabel.textContent = 'Error';
        status.textContent = 'error';
      }
    }

    toggleBtn.addEventListener('click', () => {
      const block = blocks[selectedIndex];
      showingBinary = !showingBinary;
      if (showingBinary) {
        toggleBtn.textContent = block.contentKind === 'image' ? 'Show Image' : 'Show Data';
      } else {
        toggleBtn.textContent = 'Show Binary';
      }
      renderContent();
    });

    document.getElementById('btn').addEventListener('click', readClipboard);

    document.addEventListener('keydown', e => {
      if (e.key === 'F5' || (e.ctrlKey && e.key === 'r')) {
        e.preventDefault();
        readClipboard();
      }
      // Arrow keys to navigate sidebar
      if (e.key === 'ArrowDown' && selectedIndex < blocks.length - 1) {
        e.preventDefault();
        selectBlock(selectedIndex + 1);
      }
      if (e.key === 'ArrowUp' && selectedIndex > 0) {
        e.preventDefault();
        selectBlock(selectedIndex - 1);
      }
    });

    readClipboard();
  </script>
</body>
</html>
